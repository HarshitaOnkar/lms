# Fly.io: https://fly.io/docs/languages-and-frameworks/dockerfile/
# Install flyctl, then: fly launch --dockerfile Dockerfile
# Attach a MySQL database (Fly MySQL or external) and set DATABASE_URL as a secret.

app = "lms"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
