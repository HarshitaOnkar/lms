# Render Blueprint: https://render.com/docs/blueprint-spec
# Add a MySQL instance in the dashboard and set DATABASE_URL to its internal URL.
services:
  - type: web
    name: lms
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: REFRESH_COOKIE_SECURE
        value: "true"
